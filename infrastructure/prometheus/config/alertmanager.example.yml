# Alertmanager — roteamento crítico vs. warning via Telegram
# 1) Crie um bot com o @BotFather e pegue o token
# 2) Descubra seu chat_id: envie msg ao bot e acesse
#    https://api.telegram.org/bot<TOKEN>/getUpdates
route:
  receiver: telegram-warning
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # DeadMansSwitch: NÃO vai pro Telegram (spammaria). Vai pra um heartbeat
    # externo com repeat_interval curto. Configure em healthchecks.io um check
    # com "period" maior que este repeat (ex: 10min) -> se o ping sumir, ele te avisa.
    - matchers: [ alertname = DeadMansSwitch ]
      receiver: deadmansswitch
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 2m

    - matchers: [ severity = critical ]
      receiver: telegram-critical
      repeat_interval: 1h

inhibit_rules:
  # Se o host caiu, silencia alertas derivados
  - source_matchers: [ alertname = EndpointDown ]
    target_matchers: [ severity = warning ]
    equal: ['instance']

receivers:
  - name: telegram-critical
    telegram_configs:
      - bot_token: "COLOQUE_O_TOKEN_DO_BOT"
        chat_id: 0            # <<< seu chat_id (número)
        parse_mode: HTML
        message: |
          🚨 <b>{{ .CommonLabels.alertname }}</b>
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ end }}

  - name: telegram-warning
    telegram_configs:
      - bot_token: "COLOQUE_O_TOKEN_DO_BOT"
        chat_id: 0
        parse_mode: HTML
        message: |
          ⚠️ <b>{{ .CommonLabels.alertname }}</b>
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ end }}

  # Heartbeat do DeadMansSwitch. Crie um check em https://healthchecks.io
  # (grátis) e cole a URL de ping aqui. Enquanto os pings chegam, silêncio;
  # se pararem (Prometheus/Alertmanager morreu), o healthchecks.io te alerta
  # por outro canal (e-mail/Telegram/SMS) — fora da sua VPS.
  - name: deadmansswitch
    webhook_configs:
      - url: "https://hc-ping.com/SEU-UUID-AQUI"
        send_resolved: false
