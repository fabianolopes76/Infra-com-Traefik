groups:
  - name: host
    rules:
      - alert: DiskUsageHigh
        expr: instance:node_filesystem_used:ratio > 0.85
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Disco > 85% em {{ $labels.instance }} ({{ $labels.mountpoint }})"

      # predict_linear não se pré-computa bem -> mantém expr crua
      - alert: DiskWillFillIn4Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[1h], 4*3600) < 0
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "Disco vai encher em ~4h: {{ $labels.mountpoint }}"

      - alert: HighMemory
        expr: instance:node_memory:ratio > 0.90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "RAM > 90% no host"

      - alert: HighCPU
        expr: instance:node_cpu:ratio5m > 0.85
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "CPU > 85% por 15min"

  - name: containers
    rules:
      - alert: ContainerDown
        expr: absent(container_last_seen{name="traefik"}) or absent(container_last_seen{name="prometheus"})
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Container essencial ausente"

      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total[10m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "OOM kill em {{ $labels.name }}"

      # a proteção contra divisão por zero já vive na recording rule
      - alert: ContainerMemoryNearLimit
        expr: name:container_memory:ratio > 0.9
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.name }} usando >90% do limite de memória"

  - name: http
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Endpoint fora do ar: {{ $labels.instance }}"

      - alert: SSLCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels: { severity: critical }
        annotations:
          summary: "Certificado de {{ $labels.instance }} expira em < 14 dias"

  # SLO de 99.5% de sucesso por serviço Traefik (orçamento de erro = 0.5% = 0.005).
  # Alertas por BURN-RATE multi-janela (padrão Google SRE): cada tier exige a
  # janela LONGA (confirma tendência) E a CURTA (confirma que ainda acontece),
  # eliminando ruído e disparo tardio. burn = ratio / 0.005. O guard de tráfego
  # (rate5m) evita page em serviço ocioso (ex: Reverb/websocket).
  - name: slo-traefik
    rules:
      # 14.4x: consome 2% do budget mensal em 1h -> incidente grave, PAGE já.
      - alert: TraefikErrorBudgetBurnFast
        expr: >
          service:traefik_5xx:ratio1h > (14.4 * 0.005)
          and service:traefik_5xx:ratio5m > (14.4 * 0.005)
          and service:traefik_requests:rate5m > 0.2
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Burn rápido do orçamento de erro (>14.4x) em {{ $labels.service }}"

      # 6x: queima sustentada -> PAGE, com janela maior p/ não ser espúrio.
      - alert: TraefikErrorBudgetBurnSlow
        expr: >
          service:traefik_5xx:ratio6h > (6 * 0.005)
          and service:traefik_5xx:ratio30m > (6 * 0.005)
          and service:traefik_requests:rate5m > 0.05
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "Burn sustentado do orçamento de erro (>6x) em {{ $labels.service }}"

      # 3x: erosão lenta -> ticket/warning, não acorda ninguém.
      - alert: TraefikErrorBudgetBurnWarn
        expr: >
          service:traefik_5xx:ratio1d > (3 * 0.005)
          and service:traefik_5xx:ratio2h > (3 * 0.005)
          and service:traefik_requests:rate5m > 0.05
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "Erosão do orçamento de erro (>3x) em {{ $labels.service }}"

  - name: monitoring
    rules:
      # Qualquer alvo de scrape que pare de responder (exporter caído, DB fora,
      # container recriado sem voltar). Cobre mysql/redis/postgresql/node/cadvisor/traefik.
      - alert: TargetDown
        expr: up == 0
        for: 3m
        labels: { severity: warning }
        annotations:
          summary: "Target de scrape caído: {{ $labels.job }} ({{ $labels.instance }})"

  - name: databases
    rules:
      # Liveness no nível da aplicação: cada exporter só reporta *_up=1 se
      # conseguiu conectar E consultar o banco. Melhor sinal que um TCP connect.
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "MySQL não responde (mysql_up=0)"

      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "PostgreSQL não responde (pg_up=0)"

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Redis não responde (redis_up=0)"

  - name: watchdog
    rules:
      # DeadMansSwitch: SEMPRE dispara (vector(1)). No Alertmanager é roteado para
      # um heartbeat externo (ex: healthchecks.io). Se esse ping PARAR de chegar,
      # significa que o pipeline de alerta inteiro (Prometheus/Alertmanager/rede)
      # morreu — o ponto cego clássico "quem monitora o monitor". Ver alertmanager.example.yml.
      - alert: DeadMansSwitch
        expr: vector(1)
        labels: { severity: none }
        annotations:
          summary: "Pipeline de alerta operante (heartbeat)"
