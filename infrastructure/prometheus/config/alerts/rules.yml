groups:
  - name: host
    rules:
      - alert: DiskUsageHigh
        expr: instance:node_filesystem_used:ratio > 0.85
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Disco > 85% em {{ $labels.instance }} ({{ $labels.mountpoint }})"

      # predict_linear não se pré-computa bem -> mantém expr crua
      - alert: DiskWillFillIn4Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}[1h], 4*3600) < 0
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "Disco vai encher em ~4h: {{ $labels.mountpoint }}"

      - alert: HighMemory
        expr: instance:node_memory:ratio > 0.90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "RAM > 90% no host"

      - alert: HighCPU
        expr: instance:node_cpu:ratio5m > 0.85
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "CPU > 85% por 15min"

  - name: containers
    rules:
      - alert: ContainerDown
        expr: absent(container_last_seen{name="traefik"}) or absent(container_last_seen{name="prometheus"})
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Container essencial ausente"

      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total[10m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "OOM kill em {{ $labels.name }}"

      # a proteção contra divisão por zero já vive na recording rule
      - alert: ContainerMemoryNearLimit
        expr: name:container_memory:ratio > 0.9
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.name }} usando >90% do limite de memória"

  - name: http
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Endpoint fora do ar: {{ $labels.instance }}"

      - alert: SSLCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels: { severity: critical }
        annotations:
          summary: "Certificado de {{ $labels.instance }} expira em < 14 dias"

      # ratio > 5% E tráfego mínimo (>0.2 req/s) -> mata falso crítico em
      # endpoints ociosos (Reverb/websocket) durante deploy.
      - alert: High5xxRate
        expr: >
          service:traefik_5xx:ratio5m > 0.05
          and
          service:traefik_requests:rate5m > 0.2
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Taxa de 5xx > 5% no serviço {{ $labels.service }}"

  - name: monitoring
    rules:
      # Qualquer alvo de scrape que pare de responder (exporter caído, DB fora,
      # container recriado sem voltar). Cobre mysql/redis/postgresql/node/cadvisor/traefik.
      - alert: TargetDown
        expr: up == 0
        for: 3m
        labels: { severity: warning }
        annotations:
          summary: "Target de scrape caído: {{ $labels.job }} ({{ $labels.instance }})"

  - name: watchdog
    rules:
      # DeadMansSwitch: SEMPRE dispara (vector(1)). No Alertmanager é roteado para
      # um heartbeat externo (ex: healthchecks.io). Se esse ping PARAR de chegar,
      # significa que o pipeline de alerta inteiro (Prometheus/Alertmanager/rede)
      # morreu — o ponto cego clássico "quem monitora o monitor". Ver alertmanager.example.yml.
      - alert: DeadMansSwitch
        expr: vector(1)
        labels: { severity: none }
        annotations:
          summary: "Pipeline de alerta operante (heartbeat)"
