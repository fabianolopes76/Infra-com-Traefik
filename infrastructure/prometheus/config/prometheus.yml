global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ---- Alertas ([M9]) ----
rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'cadvisor'                    # consumo por container
    static_configs:
      - targets: ['cadvisor:8080']
    # Corte de cardinalidade: descarta séries de altíssima cardinalidade e baixo
    # valor (detalhe de I/O de filesystem, tasks_state, page-faults, blkio por
    # device) que multiplicam por container e comem a RAM do Prometheus (1g).
    # NÃO afeta os dashboards (cpu/mem/network/fs_usage seguem intactos).
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_tasks_state|container_memory_failures_total|container_blkio_device_usage_total|container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|read_seconds_total|reads_merged_total|sector_reads_total|write_seconds_total|writes_merged_total|sector_writes_total|inodes_free|inodes_total)'
        action: drop

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']           # ATENÇÃO: mudou de 8080 -> 8082

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql_exporter:9104']

  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # rabbitmq: sem container em execução (job ficava DOWN à toa). Reative
  # descomentando quando subir o RabbitMQ com o plugin prometheus (porta 15692).
  # - job_name: 'rabbitmq'
  #   static_configs:
  #     - targets: ['rabbitmq:15692']

  # soketi: substituído por Reverb, que não expõe /metrics no formato Prometheus.
  # Removido para não manter target morto. (Se um dia expuser métricas, recrie o job.)
  # - job_name: 'soketi'
  #   static_configs:
  #     - targets: ['soketi:6001']

  # Uptime (http_2xx): SÓ endpoints que servem app e devem retornar 2xx.
  # probe_success=0 aqui = app fora do ar -> alerta EndpointDown é real.
  - job_name: 'blackbox-uptime'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://grafana.upsolve.com.br
          - https://fabianolopes.com
          - https://fabianolopes.adv.br
          # adicione aqui a URL pública de cada app que deva responder 2xx
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Certificado (http_tls): as 6 zonas. Tolerante a status (o apex de várias
  # responde 404), mas o handshake TLS popula probe_ssl_earliest_cert_expiry ->
  # o alerta SSLCertExpiringSoon cobre TODAS as zonas, não só as que dão 2xx.
  - job_name: 'blackbox-tls'
    metrics_path: /probe
    params:
      module: [http_tls]
    static_configs:
      - targets:
          - https://upsolve.com.br
          - https://fabianolopes.com
          - https://fabianolopes.com.br
          - https://fabianolopes.adv.br
          - https://prospere.academy
          - https://asset.cnt.br
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
