# ~/infra/infrastructure/prometheus/docker-compose.yml
# =============================================================
# STACK PROMETHEUS (corrigido)
# Mantive na pasta prometheus/ também os companheiros de
# observabilidade: Alertmanager, cAdvisor e Blackbox — eles não
# fazem sentido isolados e compartilham o ciclo de vida.
#   [A6] versões fixadas   [A7] no-new-privileges + limites
#   [M9] retenção, alerting, persistência de dados
# =============================================================

networks:
  monitoring:
    external: true
    name: monitoring
  production:
    external: true
    name: production

services:  
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: "0.75"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    labels:
      # Habilita descoberta do container
      - "traefik.enable=true"
      # Habilita a rota do traefik
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.upsolve.com.br`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      # Habilita o service do traefik (Exposer a porta interna do prometheus)
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      # Habilita o middleware de segurança
      - "traefik.http.middlewares.prometheus-auth.basicauth.users=admin:$$2y$$05$$BNzlP8aEzvem1GTzFo3g2e9yQSx.lDaVsB8dKSjA2NjDcGInznFkG"
      - "traefik.http.routers.prometheus.middlewares=admin-chain@file"
      - "traefik.docker.network=production"
    networks:
      - monitoring
      - production

  alertmanager:
    image: prom/alertmanager:v0.33.1
    container_name: alertmanager
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.25"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.3
    container_name: cadvisor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.30"
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring

  blackbox:
    image: prom/blackbox-exporter:v0.28.0
    container_name: blackbox
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: "0.10"
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring
      - production   # precisa resolver/alcançar as URLs públicas dos apps

volumes:
  prometheus_data:
    name: prometheus_data
  alertmanager_data:
    name: alertmanager_data