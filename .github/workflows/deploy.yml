# =============================================================
# Deploy Infra — CD para a VPS (srv857637)
#
# Gatilho: push na branch main.
# Fluxo:
#   1) Checkout do repositório.
#   2) Copia os arquivos para /home/fabiano/infra via SCP.
#      IMPORTANTE: o scp-action NÃO apaga arquivos no destino (não é
#      rsync --delete). Por isso os arquivos gitignored que existem só na
#      VPS são PRESERVADOS a cada deploy:
#        - infrastructure/traefik/secrets/usersfile
#        - infrastructure/traefik/secrets/*.secret (cloudflare-*)
#        - infrastructure/traefik/certs/acme.json
#   3) Recria a stack do Traefik. O scp só copia arquivos; sem este passo o
#      container continuaria rodando a config ANTIGA. Só o Traefik é recriado
#      automaticamente — as demais stacks (prometheus, grafana, etc.) são
#      recriadas manualmente (ver DEPLOY.md).
#
# Secrets do repositório necessários (Settings > Secrets and variables > Actions):
#   HOST             IP/host da VPS
#   USERNAME         usuário SSH (fabiano)
#   SSH_PRIVATE_KEY  chave privada com acesso à VPS
#
# Documentação completa do pipeline: DEPLOY.md (raiz do repo).
# =============================================================
name: "Deploy Infra"

on:
  push:
    branches:
      - main

# Evita que dois pushes seguidos recriem a stack ao mesmo tempo.
concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  # Barra o deploy se a config/regras do Prometheus estiverem inválidas.
  # Roda promtool (do próprio image do Prometheus) sobre a config real.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "promtool check (config + rules + recording)"
        run: |
          set -eu
          # Monta config/ em /etc/prometheus para casar com os caminhos absolutos
          # do rule_files (/etc/prometheus/alerts/*.yml) dentro do prometheus.yml.
          docker run --rm \
            -v "$PWD/infrastructure/prometheus/config:/etc/prometheus:ro" \
            --entrypoint promtool prom/prometheus:v3.13.1 \
            check config /etc/prometheus/prometheus.yml

  build_deploy:
    needs: validate          # só faz deploy se a validação passar
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      # Copia o repo para a VPS. Preserva secrets/certs gitignored (ver cabeçalho).
      - name: "Copy files to VPS"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/fabiano/infra"

      # Aplica a config nova no Traefik. 'up -d' é idempotente: só recria os
      # containers cujo compose/env mudou. --remove-orphans derruba containers
      # órfãos DESTE projeto (ex.: o traefik antigo que publicava a :8080).
      - name: "Recreate Traefik stack"
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            cd /home/fabiano/infra/infrastructure/traefik

            # Rede interna do socket-proxy (idempotente — não falha se já existe).
            docker network inspect socket >/dev/null 2>&1 \
              || docker network create --internal socket

            # Valida a sintaxe do compose ANTES de tocar nos containers rodando.
            docker compose config >/dev/null

            # Hash da config dinâmica (arquivos já copiados pelo scp).
            NEWSUM=$(cat config/dynamic/*.yml | sha256sum | cut -d' ' -f1)
            OLDSUM=$(cat .deploy-traefik-sum 2>/dev/null || echo none)

            # Aplica mudanças de compose (recria só o que mudou; no-op se igual).
            docker compose up -d --remove-orphans

            # Se a config dinâmica mudou, força releitura LIMPA do Traefik. O scp
            # escreve os arquivos de forma não atômica e o file provider pode ler
            # um YAML pela metade, descartar TODOS os middlewares e "grudar" nesse
            # estado quebrado. O restart elimina o race — e só roda quando muda.
            if [ "$NEWSUM" != "$OLDSUM" ]; then
              echo "Config dinâmica mudou -> restart do Traefik (releitura limpa)."
              docker compose restart traefik
              echo "$NEWSUM" > .deploy-traefik-sum
            fi

            # Estado final no log do Actions.
            docker compose ps
